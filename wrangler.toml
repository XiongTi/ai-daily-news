# wrangler.toml
name = "ai-daily"
main = "src/index.js" # <-- Important: path to your main worker script
compatibility_date = "2025-05-20" # Or your project's compatibility date
workers_dev = true

kv_namespaces = [
  { binding = "DATA_KV", id = "b2f4eac4413b49829e8c155e3247b739" }
]

[vars]
IMG_PROXY = ""  #图片代理链接，用于处理图片不显示
OPEN_TRANSLATE = "true"
USE_MODEL_PLATFORM = "OPEN"
OPENAI_API_URL = "https://api.minimaxi.com"
DEFAULT_OPEN_MODEL = "MiniMax-M2.5"
FOLO_COOKIE_KV_KEY = "folo_auth_cookie" 
FOLO_DATA_API = "https://api.folo.is/entries"
FOLO_FILTER_DAYS = 2
NEWS_AGGREGATOR_LIST_ID = "253794950504141824"
NEWS_AGGREGATOR_FETCH_PAGES = "1"
GITHUB_REPO_OWNER = "XiongTi"
GITHUB_REPO_NAME = "ai-daily-news"
GITHUB_BRANCH = "main"
LOGIN_USERNAME = "root"
LOGIN_PASSWORD = "059073"
DAILY_TITLE = "AI洞察日报"
DAILY_TITLE_MIN = " `AI 日报` "
PODCAST_TITLE = "熊倜的龙虾场"
PODCAST_BEGIN = "嘿👋"
PODCAST_END = "今天的情报就到这里，注意隐蔽，赶紧撤离"
BOOK_LINK = ""
INSERT_FOOT = "false"
INSERT_AD = "false"
INSERT_APP_URL = "👋👋"

[triggers]
crons = ["0 1 * * *"]  # UTC 01:00 = 东八区 09:00
